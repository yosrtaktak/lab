<div class="confirm-dialog">
  <h2 mat-dialog-title>Delete member?</h2>
  <mat-dialog-content>
    This action removes the selected member from the list and cannot be undone.
  </mat-dialog-content>
  <mat-dialog-actions class="confirm-actions">
    <button mat-stroked-button [mat-dialog-close]="false">Cancel</button>
    <button mat-flat-button color="warn" [mat-dialog-close]="true">Confirm</button>
  </mat-dialog-actions>
</div>
